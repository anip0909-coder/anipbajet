<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrusDuit — Tiada Sambungan</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0fdf4;color:#1e293b;padding:24px}
  .card{background:#fff;border-radius:24px;padding:48px 40px;text-align:center;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .icon{width:80px;height:80px;background:#dcfce7;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px}
  h1{font-size:22px;font-weight:800;color:#166534;margin-bottom:8px}
  p{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:24px}
  .btn{display:inline-flex;align-items:center;gap:8px;background:#16a34a;color:#fff;font-weight:700;font-size:14px;padding:12px 24px;border-radius:12px;border:none;cursor:pointer;text-decoration:none;transition:background .2s}
  .btn:hover{background:#15803d}
  .status{font-size:11px;color:#94a3b8;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Tiada Sambungan Internet</h1>
  <p>UrusDuit memerlukan sambungan internet untuk menyegerakkan data dengan Google Sheet. Data tempatan anda masih selamat.</p>
  <button class="btn" onclick="window.location.reload()">
    <span>↻</span> Cuba Semula
  </button>
  <p class="status">Data dalam peranti anda tidak terjejas.</p>
</div>
</body>
</html>
