<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <title>Dashboard Kejuruteraan Elektrik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Polyfill untuk Recharts dalam persekitaran pelayar standalone -->
  <script>window.process = { env: { NODE_ENV: 'production' } };</script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Dependencies (Kebergantungan) untuk Recharts -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  
  <!-- Recharts v2.1.12 (Versi stabil untuk pelayar UMD tanpa ralat BarChart) -->
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <!-- Babel Compiler (Gunakan versi yang stabil) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-200">
  <div id="root"></div>

  <!-- Logik Aplikasi React (PENTING: Jangan gunakan data-presets="react,env" yang boleh menyebabkan ralat import) -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LabelList } = window.Recharts;

    // --- Pengganti ikon lucide-react ---
    const Icon = ({ name, size = 20, className = "" }) => {
      const svgProps = { width: size, height: size, fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className };
      const icons = {
        LayoutDashboard: <svg {...svgProps}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>,
        Activity: <svg {...svgProps}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
        CheckSquare: <svg {...svgProps}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
        Wrench: <svg {...svgProps}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
        Settings: <svg {...svgProps}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
        Sun: <svg {...svgProps}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
        Moon: <svg {...svgProps}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
        Edit2: <svg {...svgProps}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
        Trash2: <svg {...svgProps}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
        Check: <svg {...svgProps}><polyline points="20 6 9 17 4 12"/></svg>,
        X: <svg {...svgProps}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        Menu: <svg {...svgProps}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
        AlertCircle: <svg {...svgProps}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      };
      return icons[name] || null;
    };

    // =========================================================================
    // SANGAT PENTING: TUKAR URL INI KEPADA URL WEB APP APPS SCRIPT ANDA
    // =========================================================================
    const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbytiLV-DMFyvOVEjAXC0lnoMiuIy79-OkOlOCk_sEWuiO-mDWPZgd8EzAAxL54sPL4b/exec";

    const SenaraiBulan = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];

    // Pembantu global untuk memastikan turutan bulan yang mantap (termasuk shortnames jika perlu)
    const getBulanIndex = (b) => {
      if (!b) return 99;
      const str = String(b).trim().toLowerCase();
      const idx = SenaraiBulan.findIndex(x => x.toLowerCase() === str);
      if (idx !== -1) return idx;
      const shortIdx = SenaraiBulan.findIndex(x => x.toLowerCase().startsWith(str.substring(0,3)));
      return shortIdx !== -1 ? shortIdx : 99;
    };

    function App() {
      const [darkMode, setDarkMode] = useState(false);
      const [activeTab, setActiveTab] = useState('main');
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      const [dv3Data, setDv3Data] = useState([]);
      const [ppmData, setPpmData] = useState([]);
      const [kontraktorData, setKontraktorData] = useState([]);

      const [settings, setSettings] = useState({
        systemName: "Dashboard Prestasi Kejuruteraan Elektrik",
        tabDV3: "DV3",
        tabPPM: "PPM",
        tabKontraktor: "Kontraktor"
      });

      // --- Fetch Data dari Google Apps Script API ---
      useEffect(() => {
        const fetchData = async () => {
          if (!APPSCRIPT_URL || APPSCRIPT_URL.includes("MASUKKAN_URL")) {
             setError("Sila masukkan URL Web App Apps Script pada pembolehubah APPSCRIPT_URL di dalam fail index.html");
             setLoading(false);
             return;
          }
          
          setLoading(true);
          try {
            const res = await fetch(`${APPSCRIPT_URL}?action=getData`);
            const result = await res.json();

            if(result.error) throw new Error(result.error);

            setDv3Data(result.dv3 || []);
            setPpmData(result.ppm || []);
            setKontraktorData(result.kon || []);
            setError(null);
          } catch (err) {
            console.error("Ralat mengambil data dari Apps Script:", err);
            setError("Gagal memuat turun data. Sila pastikan Apps Script URL betul dan disiarkan sebagai 'Anyone'.");
          } finally {
            setLoading(false);
          }
        };
        fetchData();
      }, []);

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      const colors = {
        primary: '#3b82f6', success: '#22c55e', danger: '#ef4444', 
        warning: '#eab308', purple: '#a855f7', 
        text: darkMode ? '#e2e8f0' : '#334155', grid: darkMode ? '#334155' : '#e2e8f0'
      };

      const navItems = [
        { id: 'main', label: 'Main Dashboard', icon: 'LayoutDashboard' },
        { id: 'dv3', label: settings.tabDV3, icon: 'Activity' },
        { id: 'ppm', label: settings.tabPPM, icon: 'CheckSquare' },
        { id: 'kontraktor', label: settings.tabKontraktor, icon: 'Wrench' },
        { id: 'tetapan', label: 'Tetapan', icon: 'Settings' },
      ];

      // --- Logik Pengemaskinian Data ke Apps Script ---
      const updateSheetData = async (gid, rowNumber, newData, setter, localData) => {
        // UI Optimistic Update
        const updated = localData.map(d => d._rowNumber === rowNumber ? { ...d, ...newData } : d);
        setter(updated);

        try {
          await fetch(APPSCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'update', gid: gid, rowNumber: rowNumber, data: newData })
          });
        } catch (e) {
          console.error("Ralat sync:", e);
          alert("Gagal menyegerakkan data ke Google Sheet. Sila semak sambungan anda.");
        }
      };

      const deleteSheetData = async (gid, rowNumber, setter, localData) => {
        if(confirm("Padam rekod ini secara kekal dari Google Sheet?")) {
          const updated = localData.filter(d => d._rowNumber !== rowNumber);
          setter(updated);

          try {
            await fetch(APPSCRIPT_URL, {
              method: 'POST',
              body: JSON.stringify({ action: 'delete', gid: gid, rowNumber: rowNumber })
            });
          } catch (e) {
            console.error("Ralat padam:", e);
            alert("Gagal memadam data dari Google Sheet.");
          }
        }
      };

      if (loading) {
        return (
          <div className={`min-h-screen flex items-center justify-center ${darkMode ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900'}`}>
            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            <span className="ml-3 text-lg">Memuatkan Data dari Google Sheets...</span>
          </div>
        );
      }

      const renderTabContent = () => {
        switch (activeTab) {
          case 'main': return <MainDashboard dv3={dv3Data} ppm={ppmData} kon={kontraktorData} colors={colors} />;
          case 'dv3': return <DV3Dashboard data={dv3Data} updater={updateSheetData} deleter={deleteSheetData} setter={setDv3Data} colors={colors} />;
          case 'ppm': return <PPMDashboard data={ppmData} updater={updateSheetData} deleter={deleteSheetData} setter={setPpmData} colors={colors} />;
          case 'kontraktor': return <KontraktorDashboard data={kontraktorData} updater={updateSheetData} deleter={deleteSheetData} setter={setKontraktorData} colors={colors} />;
          case 'tetapan': return <Tetapan settings={settings} setSettings={setSettings} />;
          default: return null;
        }
      };

      return (
        <div className={`min-h-screen font-sans ${darkMode ? 'bg-gray-900 text-gray-100' : 'bg-gray-100 text-gray-800'}`}>
          <div className={`fixed top-0 left-0 right-0 h-16 z-50 flex items-center justify-between px-4 shadow-md ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
            <div className="flex items-center space-x-4">
              <button className="md:hidden p-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                <Icon name="Menu" size={24} />
              </button>
              <h1 className="text-xl font-bold truncate text-blue-600 dark:text-blue-400">
                {settings.systemName}
              </h1>
            </div>
            
            <div className="flex items-center space-x-2 md:space-x-4">
              <div className="hidden md:flex space-x-1">
                {navItems.map(item => (
                  <button
                    key={item.id}
                    onClick={() => setActiveTab(item.id)}
                    className={`flex items-center px-3 py-2 rounded-md text-sm font-medium transition-colors ${
                      activeTab === item.id 
                        ? (darkMode ? 'bg-gray-700 text-blue-400' : 'bg-blue-100 text-blue-700')
                        : 'hover:bg-gray-200 dark:hover:bg-gray-700'
                    }`}
                  >
                    <Icon name={item.icon} size={18} className="mr-2" />
                    {item.label}
                  </button>
                ))}
              </div>
              <button 
                onClick={() => setDarkMode(!darkMode)}
                className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
              >
                <Icon name={darkMode ? 'Sun' : 'Moon'} size={20} />
              </button>
            </div>
          </div>

          {isMobileMenuOpen && (
            <div className={`md:hidden fixed top-16 left-0 right-0 z-40 shadow-lg border-t ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
              <div className="flex flex-col p-2">
                {navItems.map(item => (
                  <button
                    key={item.id}
                    onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }}
                    className={`flex items-center px-4 py-3 rounded-md text-base font-medium mb-1 ${
                      activeTab === item.id 
                        ? (darkMode ? 'bg-gray-700 text-blue-400' : 'bg-blue-100 text-blue-700')
                        : 'hover:bg-gray-200 dark:hover:bg-gray-700'
                    }`}
                  >
                    <Icon name={item.icon} size={20} className="mr-3" />
                    {item.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="pt-20 pb-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
            {error ? (
              <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded flex items-center">
                <Icon name="AlertCircle" className="mr-2" />
                <p>{error}</p>
              </div>
            ) : (
              renderTabContent()
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // REUSABLE UI COMPONENTS
    // ==========================================
    const MetricCard = ({ title, value, color, subtext }) => (
      <div className="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col justify-center items-center text-center">
        <p className="text-sm text-gray-500 dark:text-gray-400 mb-1">{title}</p>
        <div className="flex items-baseline space-x-2">
          <p className={`text-2xl font-bold ${color}`}>{value}</p>
          {subtext && <p className="text-sm font-medium text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded-full">{subtext}</p>}
        </div>
      </div>
    );

    const ChartCard = ({ title, children, className = '' }) => (
      <div className={`bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 ${className}`}>
        <h3 className="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-4">{title}</h3>
        <div className="w-full">{children}</div>
      </div>
    );

    const FilterSelect = ({ label, value, options, onChange }) => (
      <div className="flex flex-col min-w-[150px]">
        <label className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">{label}</label>
        <select 
          value={value} 
          onChange={(e) => onChange(e.target.value)}
          className="border rounded px-3 py-1.5 text-sm bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white outline-none focus:border-blue-500"
        >
          {options.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
        </select>
      </div>
    );

    const ProgressBar = ({ peratus, decimals = 2 }) => {
      const peratusNum = Number(peratus) || 0;
      const formatted = peratusNum.toFixed(decimals);
      let colorClass = 'bg-blue-500';
      
      if (peratusNum >= 80) colorClass = 'bg-green-500';
      else if (peratusNum < 50) colorClass = 'bg-red-500';
      else if (peratusNum < 80) colorClass = 'bg-yellow-500';

      return (
        <div className="flex items-center gap-2">
          <span className="text-sm font-medium min-w-[3.5rem] text-right">{formatted}%</span>
          <div className="w-full max-w-[100px] bg-gray-200 rounded-full h-2.5 dark:bg-gray-700 overflow-hidden">
            <div className={`${colorClass} h-2.5 rounded-full`} style={{ width: `${Math.min(peratusNum, 100)}%` }}></div>
          </div>
        </div>
      );
    };

    const EditableTable = ({ title, data, columns, onSave, onDelete }) => {
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({});

      const startEdit = (row) => {
        setEditingId(row.id);
        setEditForm({ ...row });
      };

      const handleInputChange = (e, key, type) => {
        let val = e.target.value;
        if (type === 'number') val = val ? Number(val) : 0;
        setEditForm({ ...editForm, [key]: val });
      };

      const saveEdit = () => {
        onSave(editForm._rowNumber, editForm); 
        setEditingId(null);
      };

      const cancelEdit = () => { setEditingId(null); };

      return (
        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mt-6">
          <div className="px-6 py-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
            <h3 className="text-lg font-semibold text-gray-800 dark:text-gray-200">{title} ({data.length} Rekod)</h3>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm text-left">
              <thead className="text-xs text-gray-700 uppercase bg-gray-100 dark:bg-gray-700 dark:text-gray-300">
                <tr>
                  {columns.map(c => <th key={c.key} className="px-4 py-3">{c.label}</th>)}
                  <th className="px-4 py-3 text-center">Tindakan</th>
                </tr>
              </thead>
              <tbody>
                {data.slice(0, 50).map((row) => {
                  const isEditing = editingId === row.id;
                  return (
                    <tr key={row.id} className="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                      {columns.map(c => (
                        <td key={c.key} className="px-4 py-2">
                          {isEditing && !c.readOnly ? (
                            <input 
                              type={c.type || "text"}
                              value={editForm[c.key]}
                              onChange={(e) => handleInputChange(e, c.key, c.type)}
                              className="w-full px-2 py-1 border rounded dark:bg-gray-900 dark:border-gray-600 outline-none focus:ring-1 focus:ring-blue-500"
                            />
                          ) : (
                            c.render ? c.render(row) : row[c.key]
                          )}
                        </td>
                      ))}
                      <td className="px-4 py-2 flex justify-center space-x-2">
                        {isEditing ? (
                          <>
                            <button onClick={saveEdit} className="text-green-600 hover:text-green-800 p-1 bg-green-100 rounded-full dark:bg-green-900/30 dark:text-green-400" title="Simpan"><Icon name="Check" size={16}/></button>
                            <button onClick={cancelEdit} className="text-gray-600 hover:text-gray-800 p-1 bg-gray-200 rounded-full dark:bg-gray-600 dark:text-gray-300" title="Batal"><Icon name="X" size={16}/></button>
                          </>
                        ) : (
                          <>
                            <button onClick={() => startEdit(row)} className="text-blue-600 hover:text-blue-800 p-1 bg-blue-100 rounded-full dark:bg-blue-900/30 dark:text-blue-400" title="Sunting"><Icon name="Edit2" size={16}/></button>
                            <button onClick={() => onDelete(row._rowNumber)} className="text-red-600 hover:text-red-800 p-1 bg-red-100 rounded-full dark:bg-red-900/30 dark:text-red-400" title="Padam"><Icon name="Trash2" size={16}/></button>
                          </>
                        )}
                      </td>
                    </tr>
                  )
                })}
                {data.length === 0 && (
                  <tr><td colSpan={columns.length + 1} className="text-center py-8 text-gray-500">Tiada rekod ditemui berdasarkan penapis semasa.</td></tr>
                )}
                {data.length > 50 && (
                   <tr><td colSpan={columns.length + 1} className="text-center py-3 text-xs text-gray-500 bg-gray-50 dark:bg-gray-800/50">Hanya 50 rekod pertama dipaparkan. Gunakan penapis untuk mencari data khusus.</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ==========================================
    // 1. MAIN DASHBOARD TAB
    // ==========================================
    const MainDashboard = ({ dv3, ppm, kon, colors }) => {
      const [filterBulan, setFilterBulan] = useState('Semua');
      const [filterTahun, setFilterTahun] = useState('Semua');

      const tahunOptions = useMemo(() => {
        const years = new Set([...dv3.map(d=>d.Tahun), ...ppm.map(d=>d.Tahun), ...kon.map(d=>d.Tahun)]);
        return ['Semua', ...Array.from(years).filter(y => y).sort((a,b)=>b-a)];
      }, [dv3, ppm, kon]);

      const bulanOptions = ['Semua', ...SenaraiBulan];

      const fDv3 = useMemo(() => dv3.filter(d => 
        (filterTahun === 'Semua' || String(d.Tahun) === String(filterTahun)) &&
        (filterBulan === 'Semua' || String(d.Bulan) === String(filterBulan))
      ), [dv3, filterTahun, filterBulan]);

      const fPpm = useMemo(() => ppm.filter(d => 
        (filterTahun === 'Semua' || String(d.Tahun) === String(filterTahun)) &&
        (filterBulan === 'Semua' || String(d.Bulan) === String(filterBulan))
      ), [ppm, filterTahun, filterBulan]);

      const fKon = useMemo(() => kon.filter(d => 
        (filterTahun === 'Semua' || String(d.Tahun) === String(filterTahun)) &&
        (filterBulan === 'Semua' || String(d.Bulan) === String(filterBulan))
      ), [kon, filterTahun, filterBulan]);

      const mJumlahDoket = fDv3.reduce((acc, curr) => acc + (Number(curr['Jumlah Doket']) || 0), 0);
      const mSiap = fDv3.reduce((acc, curr) => acc + (Number(curr['Siap']) || 0), 0);
      const mTakSiap = fDv3.reduce((acc, curr) => acc + (Number(curr['Tak Siap']) || 0), 0);
      const mBatal = fDv3.reduce((acc, curr) => acc + (Number(curr['Batal']) || 0), 0);
      const mJumlahPPM = fPpm.reduce((acc, curr) => acc + (Number(curr['Jumlah PPM']) || 0), 0);

        takSiap: globalFiltered.reduce((acc, curr) => acc + (Number(curr['Tak Siap']) || 0), 0),
      };
      metrics.peratus = metrics.jumlah > 0 ? ((metrics.siap / metrics.jumlah) * 100).toFixed(2) : "0.00";
      const pTakSiap = metrics.jumlah > 0 ? ((metrics.takSiap / metrics.jumlah) * 100).toFixed(2) : "0.00";

      const chart1Data = useMemo(() => {
        const grouped = globalFiltered.reduce((acc, curr) => {
          const p = curr.Penyenggara || 'Tiada';
          if(!acc[p]) acc[p] = { name: p, Siap: 0, 'Tak Siap': 0 };
          acc[p].Siap += (Number(curr['Siap']) || 0);
          acc[p]['Tak Siap'] += (Number(curr['Tak Siap']) || 0);
          return acc;
        }, {});
        return Object.values(grouped);
      }, [globalFiltered]);

      const chart2Data = useMemo(() => {
        const grouped = globalFiltered.reduce((acc, curr) => {
          const b = curr.Bulan ? String(curr.Bulan).trim() : 'Tiada';
          acc[b] = (acc[b] || 0) + (Number(curr['Jumlah PPM']) || 0);
          return acc;
        }, {});
        return Object.keys(grouped).map(k => ({ name: k, Jumlah: grouped[k] })).sort((a,b) => getBulanIndex(a.name) - getBulanIndex(b.name));
      }, [globalFiltered]);

      // Tukar tak siap readOnly, Jadikan Jumlah PPM boleh diedit
      const columns = [
        { key: 'Tahun', label: 'Tahun', type: 'text', readOnly: true },
        { key: 'Bulan', label: 'Bulan', type: 'text', readOnly: true },
        { key: 'Penyenggara', label: 'Penyenggara', type: 'text', readOnly: true },
        { key: 'Siap', label: 'Siap', type: 'number' },
        { key: 'Jumlah PPM', label: 'Jumlah PPM', type: 'number' },
        { key: 'Tak Siap', label: 'Tak Siap', type: 'number', readOnly: true },
        { 
          key: 'Peratus', label: '% Siap', readOnly: true, 
          render: (row) => {
            const peratus = row['Jumlah PPM'] > 0 ? ((row['Siap'] / row['Jumlah PPM']) * 100) : 0;
            return <ProgressBar peratus={peratus} decimals={2} />;
          }
        }
      ];

      const handleSaveEdit = (rowNumber, newRowData) => {
        const jp = Number(newRowData['Jumlah PPM']) || 0;
        const s = Number(newRowData['Siap']) || 0;
        newRowData['Tak Siap'] = Math.max(0, jp - s); // Elak nilai negatif jika silap
        updater(GID, rowNumber, newRowData, setter, data);
      };

      const handleDelete = (rowNumber) => deleter(GID, rowNumber, setter, data);

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex flex-wrap gap-4 bg-white dark:bg-gray-800 p-4 rounded-lg shadow">
             <div className="w-full text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Penapis Utama Dashboard (Carta & Metrik)</div>
            <FilterSelect label="Tahun" value={filterTahun} options={tahunOptions} onChange={setFilterTahun} />
            <FilterSelect label="Bulan Mula" value={filterBulanMula} options={bulanOptions} onChange={setFilterBulanMula} />
            <FilterSelect label="Bulan Akhir" value={filterBulanAkhir} options={bulanOptions} onChange={setFilterBulanAkhir} />
            <FilterSelect label="Penyenggara" value={filterPenyenggara} options={penyenggaraOptions} onChange={setFilterPenyenggara} />
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <MetricCard title="Jumlah PPM" value={metrics.jumlah} color="text-purple-500" />
            <MetricCard title="Siap" value={metrics.siap} subtext={`${metrics.peratus}%`} color="text-green-500" />
            <MetricCard title="Tak Siap" value={metrics.takSiap} subtext={`${pTakSiap}%`} color="text-red-500" />
            <MetricCard title="% Siap Keseluruhan" value={`${metrics.peratus}%`} color="text-indigo-500" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <ChartCard title="Prestasi Penyenggara (PPM)">
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={chart1Data} margin={{ top: 40, right: 20, left: 0, bottom: 60 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={colors.grid} />
                  <XAxis dataKey="name" stroke={colors.text} interval={0} tick={{ fontSize: 11, angle: -45, textAnchor: 'end' }} height={60} />
                  <YAxis stroke={colors.text} />
                  <Tooltip />
                  <Legend verticalAlign="top" height={36} />
                  <Bar dataKey="Siap" stackId="a" fill={colors.success}>
                    <LabelList dataKey="Siap" position="center" angle={-90} fill="#fff" fontSize={11} formatter={(v)=> v > 0 ? v : ''} />
                  </Bar>
                  <Bar dataKey="Tak Siap" stackId="a" fill={colors.danger}>
                    <LabelList dataKey="Tak Siap" position="center" angle={-90} fill="#fff" fontSize={11} formatter={(v)=> v > 0 ? v : ''} />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>

            <ChartCard title="Trend Bulanan PPM">
              <ResponsiveContainer width="100%" height={300}>
                <LineChart data={chart2Data} margin={{ top: 40, right: 20, left: 0, bottom: 60 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={colors.grid} />
                  <XAxis dataKey="name" stroke={colors.text} interval={0} tick={{ fontSize: 11, angle: -45, textAnchor: 'end' }} height={60} />
                  <YAxis stroke={colors.text} />
                  <Tooltip />
                  <Line type="monotone" dataKey="Jumlah" stroke={colors.purple} strokeWidth={3}>
                    <LabelList dataKey="Jumlah" position="top" angle={-90} offset={20} fill={colors.text} fontSize={12} />
                  </Line>
                </LineChart>
              </ResponsiveContainer>
            </ChartCard>
          </div>

          <div className="mt-8">
            <div className="flex flex-wrap gap-4 bg-white dark:bg-gray-800 p-4 rounded-t-lg border-b dark:border-gray-700">
              <div className="w-full text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Penapis Khusus Jadual Rekod PPM</div>
              <FilterSelect label="Tahun" value={tTahun} options={tahunOptions} onChange={setTTahun} />
              <FilterSelect label="Bulan" value={tBulan} options={bulanOptions} onChange={setTBulan} />
              <FilterSelect label="Penyenggara" value={tPeny} options={penyenggaraOptions} onChange={setTPeny} />
            </div>
            <div className="-mt-6">
              <EditableTable title="Rekod PPM (Pautan ke Google Sheet)" data={tableFiltered} columns={columns} onSave={handleSaveEdit} onDelete={handleDelete} />
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 4. KONTRAKTOR DASHBOARD TAB
    // ==========================================
    const KontraktorDashboard = ({ data, updater, deleter, setter, colors }) => {
      const GID = 0;
      
      const [filterTahun, setFilterTahun] = useState('Semua');
      const [filterBulanMula, setFilterBulanMula] = useState('Semua');
      const [filterBulanAkhir, setFilterBulanAkhir] = useState('Semua');
      const [filterKontraktor, setFilterKontraktor] = useState('Semua');
      const [filterZon, setFilterZon] = useState('Semua');

      const [tTahun, setTTahun] = useState('Semua');
      const [tBulan, setTBulan] = useState('Semua');
      const [tKon, setTKon] = useState('Semua');

      const tahunOptions = ['Semua', ...Array.from(new Set(data.map(d=>d.Tahun))).filter(Boolean).sort((a,b)=>b-a)];
      const bulanOptions = ['Semua', ...SenaraiBulan];
      const kontraktorOptions = ['Semua', ...Array.from(new Set(data.map(d=>d.Kontraktor))).filter(Boolean).sort()];
      const zonOptions = ['Semua', ...Array.from(new Set(data.map(d=>d.Zon))).filter(Boolean).sort()];

      const globalFiltered = useMemo(() => {
        return data.filter(d => {
          let passTahun = filterTahun === 'Semua' || String(d.Tahun) === String(filterTahun);
          let passKon = filterKontraktor === 'Semua' || String(d.Kontraktor).trim() === String(filterKontraktor).trim();
          let passZon = filterZon === 'Semua' || String(d.Zon).trim() === String(filterZon).trim();
          let passBulan = true;
          if (filterBulanMula !== 'Semua' && filterBulanAkhir !== 'Semua') {
            const idxD = getBulanIndex(d.Bulan);
            const idxM = getBulanIndex(filterBulanMula);
            const idxA = getBulanIndex(filterBulanAkhir);
            if (idxD !== 99) passBulan = (idxD >= idxM && idxD <= idxA);
          }
          return passTahun && passKon && passZon && passBulan;
        });
      }, [data, filterTahun, filterBulanMula, filterBulanAkhir, filterKontraktor, filterZon]);

      const tableFiltered = useMemo(() => {
        return data.filter(d => {
          const passTahun = tTahun === 'Semua' || String(d.Tahun) === String(tTahun);
          const passBulan = tBulan === 'Semua' || String(d.Bulan).trim().toLowerCase() === String(tBulan).toLowerCase();
          const passKon = tKon === 'Semua' || String(d.Kontraktor).trim() === String(tKon).trim();
          return passTahun && passBulan && passKon;
        });
      }, [data, tTahun, tBulan, tKon]);

      const metrics = {
        jumlahDoket: globalFiltered.reduce((acc, curr) => acc + (Number(curr['Jumlah Doket']) || 0), 0),
        jumlahRM: globalFiltered.reduce((acc, curr) => acc + (Number(curr['Jumlah RM']) || 0), 0),
        bilKontraktor: new Set(globalFiltered.map(d=>d.Kontraktor).filter(Boolean)).size
      };

      const chart1Data = useMemo(() => {
        const grouped = globalFiltered.reduce((acc, curr) => {
          const k = curr.Kontraktor || 'Tiada';
          acc[k] = (acc[k] || 0) + (Number(curr['Jumlah Doket']) || 0);
          return acc;
        }, {});
        return Object.keys(grouped).map(k => ({ name: k, Jumlah: grouped[k] }));
      }, [globalFiltered]);

      const chart2Data = useMemo(() => {
        const grouped = globalFiltered.reduce((acc, curr) => {
          const k = curr.Kontraktor || 'Tiada';
          acc[k] = (acc[k] || 0) + (Number(curr['Jumlah RM']) || 0);
          return acc;
        }, {});
        return Object.keys(grouped).map(k => ({ name: k, RM: grouped[k] }));
      }, [globalFiltered]);

      // CARTA PAI: Peratusan RM bagi Zon
      const chart3Data = useMemo(() => {
        const grouped = globalFiltered.reduce((acc, curr) => {
          const z = curr.Zon ? String(curr.Zon).trim() : 'Lain-lain';
          acc[z] = (acc[z] || 0) + (Number(curr['Jumlah RM']) || 0);
          return acc;
        }, {});
        return Object.keys(grouped).map(k => ({ name: k, value: grouped[k] }));
      }, [globalFiltered]);

      const columns = [
        { key: 'Tahun', label: 'Tahun', type: 'text', readOnly: true },
        { key: 'Bulan', label: 'Bulan', type: 'text', readOnly: true },
        { key: 'Kontraktor', label: 'Kontraktor', type: 'text', readOnly: true },
        { key: 'Zon', label: 'Zon', type: 'text', readOnly: true },
        { key: 'Jumlah Doket', label: 'Jumlah Doket', type: 'number' },
        { 
          key: 'Jumlah RM', label: 'Jumlah RM (RM)', type: 'number',
          render: (row) => row['Jumlah RM'] ? Number(row['Jumlah RM']).toLocaleString('en-MY', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '0.00'
        }
      ];

      const handleSaveEdit = (rowNumber, newRowData) => updater(GID, rowNumber, newRowData, setter, data);
      const handleDelete = (rowNumber) => deleter(GID, rowNumber, setter, data);

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="flex flex-wrap gap-4 bg-white dark:bg-gray-800 p-4 rounded-lg shadow">
            <div className="w-full text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Penapis Utama Dashboard (Carta & Metrik)</div>
            <FilterSelect label="Tahun" value={filterTahun} options={tahunOptions} onChange={setFilterTahun} />
            <FilterSelect label="Bulan Mula" value={filterBulanMula} options={bulanOptions} onChange={setFilterBulanMula} />
            <FilterSelect label="Bulan Akhir" value={filterBulanAkhir} options={bulanOptions} onChange={setFilterBulanAkhir} />
            <FilterSelect label="Kontraktor" value={filterKontraktor} options={kontraktorOptions} onChange={setFilterKontraktor} />
            <FilterSelect label="Zon" value={filterZon} options={zonOptions} onChange={setFilterZon} />
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <MetricCard title="Jumlah Doket" value={metrics.jumlahDoket} color="text-blue-500" />
            <MetricCard title="Jumlah RM" value={`RM ${metrics.jumlahRM.toLocaleString('en-MY', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`} color="text-yellow-500" />
            <MetricCard title="Bilangan Kontraktor" value={metrics.bilKontraktor} color="text-indigo-500" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <ChartCard title="Doket Mengikut Kontraktor">
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={chart1Data} margin={{ top: 40, right: 20, left: 0, bottom: 80 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={colors.grid} />
                  <XAxis dataKey="name" stroke={colors.text} interval={0} tick={{ fontSize: 11, angle: -45, textAnchor: 'end' }} height={80} />
                  <YAxis stroke={colors.text} />
                  <Tooltip />
                  <Bar dataKey="Jumlah" fill={colors.primary} name="Jumlah Doket" radius={[4, 4, 0, 0]}>
                    <LabelList dataKey="Jumlah" position="top" angle={-90} offset={20} fill={colors.text} fontSize={12} />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>

            <ChartCard title="Nilai RM Mengikut Kontraktor">
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={chart2Data} margin={{ top: 40, right: 20, left: 0, bottom: 80 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={colors.grid} />
                  <XAxis dataKey="name" stroke={colors.text} interval={0} tick={{ fontSize: 11, angle: -45, textAnchor: 'end' }} height={80} />
                  <YAxis stroke={colors.text} />
                  <Tooltip formatter={(v) => `RM ${Number(v).toLocaleString('en-MY', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`} />
                  <Bar dataKey="RM" fill={colors.warning} name="Jumlah RM" radius={[4, 4, 0, 0]}>
                    <LabelList dataKey="RM" position="top" angle={-90} offset={35} fill={colors.text} fontSize={12} formatter={(v) => Number(v).toLocaleString('en-MY', {minimumFractionDigits: 2, maximumFractionDigits: 2})} />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </ChartCard>

            <ChartCard title="% RM Mengikut Zon" className="lg:col-span-2">
              <ResponsiveContainer width="100%" height={300}>
                <PieChart>
                  <Pie
                    data={chart3Data}
                    cx="50%"
                    cy="50%"
                    labelLine={true}
                    label={({ name, percent }) => `${name}: ${(percent * 100).toFixed(1)}%`}
                    outerRadius={100}
                    dataKey="value"
                  >
                    {chart3Data.map((entry, index) => (
                      <Cell key={`cell-${index}`} fill={[colors.primary, colors.warning, colors.success, colors.purple, colors.danger][index % 5]} />
                    ))}
                  </Pie>
                  <Tooltip formatter={(value) => `RM ${Number(value).toLocaleString('en-MY', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`} />
                  <Legend />
                </PieChart>
              </ResponsiveContainer>
            </ChartCard>
          </div>

          <div className="mt-8">
            <div className="flex flex-wrap gap-4 bg-white dark:bg-gray-800 p-4 rounded-t-lg border-b dark:border-gray-700">
              <div className="w-full text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Penapis Khusus Jadual Rekod Kontraktor</div>
              <FilterSelect label="Tahun" value={tTahun} options={tahunOptions} onChange={setTTahun} />
              <FilterSelect label="Bulan" value={tBulan} options={bulanOptions} onChange={setTBulan} />
              <FilterSelect label="Kontraktor" value={tKon} options={kontraktorOptions} onChange={setTKon} />
            </div>
            <div className="-mt-6">
              <EditableTable title="Rekod Kontraktor (Pautan ke Google Sheet)" data={tableFiltered} columns={columns} onSave={handleSaveEdit} onDelete={handleDelete} />
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 5. TETAPAN (SETTINGS) TAB
    // ==========================================
    const Tetapan = ({ settings, setSettings }) => {
      const [formData, setFormData] = useState(settings);

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSave = () => {
        setSettings(formData);
        alert("Tetapan berjaya disimpan!");
      };

      return (
        <div className="max-w-2xl mx-auto space-y-6 animate-fade-in">
          <div className="bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden">
            <div className="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
              <h2 className="text-lg font-semibold flex items-center">
                <Icon name="Settings" className="mr-2" /> Tetapan Sistem
              </h2>
            </div>
            <div className="p-6 space-y-4">
              <div className="space-y-1">
                <label className="text-sm font-medium text-gray-700 dark:text-gray-300">Nama Sistem</label>
                <input 
                  type="text" 
                  name="systemName"
                  value={formData.systemName} 
                  onChange={handleChange}
                  className="w-full px-4 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                />
              </div>
              <div className="space-y-1">
                <label className="text-sm font-medium text-gray-700 dark:text-gray-300">Nama Tab 1 (Default: DV3)</label>
                <input 
                  type="text" 
                  name="tabDV3"
                  value={formData.tabDV3} 
                  onChange={handleChange}
                  className="w-full px-4 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 focus:ring-blue-500 outline-none" 
                />
              </div>
              <div className="space-y-1">
                <label className="text-sm font-medium text-gray-700 dark:text-gray-300">Nama Tab 2 (Default: PPM)</label>
                <input 
                  type="text" 
                  name="tabPPM"
                  value={formData.tabPPM} 
                  onChange={handleChange}
                  className="w-full px-4 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 focus:ring-blue-500 outline-none" 
                />
              </div>
              <div className="space-y-1">
                <label className="text-sm font-medium text-gray-700 dark:text-gray-300">Nama Tab 3 (Default: Kontraktor)</label>
                <input 
                  type="text" 
                  name="tabKontraktor"
                  value={formData.tabKontraktor} 
                  onChange={handleChange}
                  className="w-full px-4 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 focus:ring-blue-500 outline-none" 
                />
              </div>
              
              <button 
                onClick={handleSave}
                className="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors"
              >
                Simpan Tetapan
              </button>
              
              <div className="mt-4 p-4 bg-green-50 dark:bg-gray-700/50 rounded-md text-sm text-green-800 dark:text-green-300">
                <strong>Nota:</strong> Fail index.html anda telah berjaya dihubungkan ke Google Apps Script. Sebarang tindakan simpan/padam akan terus mengubah data di Google Sheets.
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- Render App ke DOM ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
